name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3️⃣ Cache Maven
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4️⃣ Build global (IMPORTANT pour multi-module)
      - name: Build all modules
        run: |
          echo "🔹 Build du projet multi-module"
          mvn clean install -DskipTests

      # 5️⃣ Login Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6️⃣ Build & Push Docker
      - name: Build and Push Docker Images
        run: |
          DOCKER_HUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

          SERVICES=(
            "api-gateway"
            "auction-service"
            "auth-service"
            "configuration-service"
            "dispute-service"
            "eureka-registry"
            "item-service"
            "messaging-service"
            "notif-service"
            "payments-service"
            "rental-service"
            "review-service"
            "subscription-service"
          )

          for SERVICE in ${SERVICES[@]}; do
            IMAGE_NAME="$DOCKER_HUB_USERNAME/$SERVICE:latest"

            echo "🔹 Build de $SERVICE"
            docker build -t $IMAGE_NAME ./$SERVICE

            echo "📤 Push de $IMAGE_NAME"
            docker push $IMAGE_NAME
          done
