version: "3.9"

services:

  # ========================
  # 🟢 POSTGRES
  # ========================
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: renthub_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ========================
  # 🟡 KAFKA
  # ========================
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CLUSTER_ID: q1Sh-9_ISia_zwGINzRvyQ
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ========================
  # 🔵 EUREKA
  # ========================
  eureka-registry:
    image: gorgui/eureka-registry:latest
    ports:
      - "8761:8761"

  # ========================
  # ⚙️ CONFIG SERVER
  # ========================
  configuration-service:
    image: gorgui/configuration-service:latest
    depends_on:
      - eureka-registry
    ports:
      - "8888:8888"

  # ========================
  # 🚪 API GATEWAY
  # ========================
  api-gateway:
    image: gorgui/api-gateway:latest
    depends_on:
      - eureka-registry
      - configuration-service
    ports:
      - "8080:8080"

  # ========================
  # 🔐 AUTH
  # ========================
  auth-service:
    image: gorgui/auth-service:latest
    depends_on:
      - eureka-registry
      - configuration-service
      - kafka
      - postgres

  # ========================
  # 🧾 AUCTION
  # ========================
  auction-service:
    image: gorgui/auction-service:latest
    depends_on:
      - eureka-registry
      - configuration-service
      - kafka
      - postgres

  # ========================
  # 📦 ITEM
  # ========================
  item-service:
    image: gorgui/item-service:latest
    depends_on:
      - eureka-registry
      - configuration-service
      - kafka
      - postgres

  # ========================
  # 💳 PAYMENT
  # ========================
  payments-service:
    image: gorgui/payments-service:latest
    depends_on:
      - eureka-registry
      - configuration-service
      - kafka
      - postgres

  # ========================
  # 🔔 NOTIFICATION
  # ========================
  notif-service:
    image: gorgui/notif-service:latest
    depends_on:
      - eureka-registry
      - configuration-service
      - kafka
      - postgres

  # ========================
  # 💬 MESSAGING
  # ========================
  messaging-service:
    image: gorgui/messaging-service:latest
    depends_on:
      - eureka-registry
      - configuration-service
      - kafka
      - postgres

  # ========================
  # 📦 AUTRES SERVICES
  # ========================
  dispute-service:
    image: gorgui/dispute-service:latest
    depends_on:
      - eureka-registry
      - configuration-service
      - kafka
      - postgres

  rental-service:
    image: gorgui/rental-service:latest
    depends_on:
      - eureka-registry
      - configuration-service
      - kafka
      - postgres

  review-service:
    image: gorgui/review-service:latest
    depends_on:
      - eureka-registry
      - configuration-service
      - kafka
      - postgres

  subscription-service:
    image: gorgui/subscription-service:latest
    depends_on:
      - eureka-registry
      - configuration-service
      - kafka
      - postgres

volumes:
  kafka_data:
  postgres_data: