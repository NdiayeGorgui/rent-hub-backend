apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-registry
  template:
    metadata:
      labels:
        app: eureka-registry
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting; sleep 3; done']
      containers:
        - name: eureka-registry
          image: gorgui/eureka-registry:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-registry
spec:
  selector:
    app: eureka-registry
  ports:
    - port: 8761
      targetPort: 8761
