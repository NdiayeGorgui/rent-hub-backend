apiVersion: apps/v1
kind: Deployment
metadata:
  name: configuration-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: configuration-service
  template:
    metadata:
      labels:
        app: configuration-service
    spec:
      initContainers:
        - name: wait-eureka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z eureka-registry 8761; do echo waiting; sleep 3; done']
      containers:
        - name: configuration-service
          image: gorgui/configuration-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8888
          env:
            - name: eureka.client.service-url.defaultZone
              value: http://eureka-registry:8761/eureka/
            - name: SPRING_CLOUD_CONFIG_ENABLED
              value: "false"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:file:./"
            - name: SPRING_APPLICATION_NAME
              value: configuration-service
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: configuration-service
spec:
  selector:
    app: configuration-service
  ports:
    - port: 8888
      targetPort: 8888
