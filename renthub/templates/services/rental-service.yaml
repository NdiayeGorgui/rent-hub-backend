apiVersion: apps/v1
kind: Deployment
metadata:
  name: rental-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rental-service
  template:
    metadata:
      labels:
        app: rental-service
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting; sleep 3; done']
        - name: wait-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo waiting; sleep 3; done']
        - name: wait-eureka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z eureka-registry 8761; do echo waiting; sleep 3; done']
        - name: wait-config
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z configuration-service 8888; do echo waiting; sleep 3; done']
      containers:
        - name: rental-service
          image: gorgui/rental-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: JWT_SECRET
              value: "HzuHlbBi+nyXGNVWXYo9I7ojNnxfE8FVnmt1jV0nMeU="
            - name: eureka.client.service-url.defaultZone
              value: "http://eureka-registry:8761/eureka/"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://configuration-service:8888"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "password"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/renthub_db?currentSchema=rental_schema"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rental-service
spec:
  selector:
    app: rental-service
  ports:
    - port: 8083
      targetPort: 8083
